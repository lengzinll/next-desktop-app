name: "Tauri Release"

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ✅ Rust setup (IMPORTANT)
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ✅ Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Bun
      - name: Install Bun
        run: npm install -g bun

      # dependencies
      - name: Install dependencies
        run: bun install

      # build frontend
      - name: Build Next.js
        run: bun run build

      # 🔥 THIS is the correct Tauri build step
      - name: Build Tauri App
        run: bunx tauri build

      # 📦 Upload artifacts manually (IMPORTANT)
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/**/*